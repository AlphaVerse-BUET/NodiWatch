<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b58c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#006d54;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circle background -->
  <circle cx="100" cy="100" r="95" fill="url(#gradient)"/>
  
  <!-- Wave pattern -->
  <path d="M 30 100 Q 50 85, 70 100 T 110 100 T 150 100 T 170 100" 
