  <path d="M 30 80 Q 50 65, 70 80 T 110 80 T 150 80 T 170 80" 
        stroke="white" stroke-width="3" fill="none" opacity="0.8"/>
  
  <!-- Text -->
  <text x="100" y="160" font-family="Arial, sans-serif" font-size="24" 
        font-weight="bold" fill="white" text-anchor="middle">NodiWatch</text>
</svg>
